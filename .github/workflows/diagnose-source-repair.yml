name: Diagnose source repair

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run repair transformation only
        id: repair
        shell: bash
        run: |
          set +e
          {
            git fetch origin implement-synchronous-reactive-turn
            git checkout origin/implement-synchronous-reactive-turn -- \
              src/core/src/program/compiler/constants.rs \
              src/core/src/program/program.rs \
              src/core/src/value.rs \
              src/interpreter/src/stdlib/access/tuple.rs
            python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/repair-structural-alias-line-endings.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index("\n          PY", start)
          recipe = workflow[start:end]
          recipe = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in recipe.splitlines()
          )
          exec(compile(recipe, 'source-repair-recipe', 'exec'), {})
          PY
          } > source-repair-diagnostic.txt 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat source-repair-diagnostic.txt

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-repair-diagnostic
          path: source-repair-diagnostic.txt

      - name: Report status
        if: always()
        run: exit "${{ steps.repair.outputs.status || '1' }}"
