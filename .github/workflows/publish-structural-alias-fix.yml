name: Publish structural alias fix

on:
  pull_request:

permissions:
  contents: write
  actions: write

jobs:
  publish-fix:
    if: >-
      github.event.pull_request.head.ref == 'agent/refactor-ci-observability' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Apply verified fix recipe
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-structural-alias-fix.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index("\n          PY", start)
          recipe = workflow[start:end]
          recipe = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in recipe.splitlines()
          )
          exec(compile(recipe, 'structural-alias-fix-recipe', 'exec'), {})
          PY

          git rm \
            .github/workflows/apply-structural-alias-fix.yml \
            .github/workflows/diagnose-structural-alias.yml \
            .github/workflows/publish-structural-alias-fix.yml

      - name: Verify targeted regression
        run: |
          cargo test -p mech-interpreter --lib \
            expressions::structural_alias_access_tests::decoded_structural_alias_access_matches_source \
            -- --exact

      - name: Verify complete interpreter suite
        run: cargo test -p mech-interpreter --lib

      - name: Commit and push verified fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git commit -m 'fix tuple structural alias bytecode path'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
