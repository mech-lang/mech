name: Publish structural alias source fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  publish-source:
    if: >-
      github.event.pull_request.head.ref == 'agent/refactor-ci-observability' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply verified source fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-structural-alias-fix.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index("\n          PY", start)
          recipe = workflow[start:end]
          recipe = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in recipe.splitlines()
          )
          exec(compile(recipe, 'verified-structural-alias-source-fix', 'exec'), {})
          PY

          git checkout -- .github/workflows/ci.yml

      - name: Commit and push source changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/core/src/program/compiler/constants.rs \
            src/core/src/program/program.rs \
            src/core/src/value.rs \
            src/interpreter/src/stdlib/access/tuple.rs
          git status --short
          git commit -m 'fix tuple structural alias bytecode path'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
