name: Repair structural alias source v2

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-source:
    if: >-
      github.event.pull_request.head.ref == 'agent/refactor-ci-observability' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Restore base files and apply byte-preserving fix
        shell: bash
        run: |
          git fetch origin implement-synchronous-reactive-turn
          git checkout origin/implement-synchronous-reactive-turn -- \
            src/core/src/program/compiler/constants.rs \
            src/core/src/program/program.rs \
            src/core/src/value.rs \
            src/interpreter/src/stdlib/access/tuple.rs

          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> tuple[Path, bytes]:
              file = Path(path)
              return file, file.read_bytes()

          def write(file: Path, data: bytes) -> None:
              file.write_bytes(data)

          def newline_near(data: bytes, position: int) -> bytes:
              window = data[max(0, position - 256):position + 256]
              return b'\r\n' if b'\r\n' in window else b'\n'

          # Fix recursive Value constant kind and add Tuple ValueKind decoding.
          file, data = read('src/core/src/program/compiler/constants.rs')
          impl_pos = data.index(b'impl ConstElem for Value {')
          recursive_pos = data.index(b'self.value_kind()', impl_pos)
          data = data[:recursive_pos] + b'self.kind()' + data[recursive_pos + len(b'self.value_kind()'):]

          kind_impl = data.index(b'impl ConstElem for ValueKind {')
          match_pos = data.index(b'match tag {', kind_impl)
          set_marker = data.index(b'      #[cfg(feature = "set")]', match_pos)
          nl = newline_near(data, set_marker)
          tuple_kind = nl.join([
              b'      #[cfg(feature = "tuple")]',
              b'      27 => {',
              b'        let element_count = cursor',
              b'          .read_u32::<LittleEndian>()',
              b'          .expect("read tuple kind length") as usize;',
              b'        let mut elements = Vec::with_capacity(element_count);',
              b'        for _ in 0..element_count {',
              b'          let vk = ValueKind::from_le(&bytes[cursor.position() as usize..]);',
              b'          let mut encoded = Vec::new();',
              b'          vk.write_le(&mut encoded);',
              b'          cursor.set_position(cursor.position() + encoded.len() as u64);',
              b'          elements.push(vk);',
              b'        }',
              b'        ValueKind::Tuple(elements)',
              b'      }',
              b'',
          ])
          data = data[:set_marker] + tuple_kind + data[set_marker:]
          write(file, data)

          # Decode tuple constants into runtime values.
          file, data = read('src/core/src/program/program.rs')
          table_pos = data.index(b'TypeTag::Table => {')
          fallback_pos = data.index(b'        _ => {', table_pos)
          nl = newline_near(data, fallback_pos)
          tuple_constant = nl.join([
              b'        #[cfg(feature = "tuple")]',
              b'        TypeTag::Tuple => {',
              b'          if data.len() < 9 {',
              b'            return Err(MechError::new(ConstantTooShortError { type_name: "tuple" }, None).with_compiler_loc());',
              b'          }',
              b'          let tuple = MechTuple::from_le(&data);',
              b'          Value::Tuple(Ref::new(tuple))',
              b'        },',
          ]) + nl
          data = data[:fallback_pos] + tuple_constant + data[fallback_pos:]
          write(file, data)

          # Support container values in generated variable-definition factories.
          file, data = read('src/core/src/value.rs')
          enum_marker = b'      #[cfg(feature = "enum")]'
          enum_pos = data.index(enum_marker, data.index(b'pub unsafe fn as_unchecked'))
          nl = newline_near(data, enum_pos)
          atom_arm = nl.join([
              b'      #[cfg(feature = "atom")]',
              b'      Value::Atom(r) => &*(r as *const Ref<MechAtom> as *const Ref<T>),',
          ]) + nl
          data = data[:enum_pos] + atom_arm + data[enum_pos:]

          enum_value = b'      Value::Enum(r) => &*(r as *const Ref<MechEnum> as *const Ref<T>),'
          after_enum = data.index(enum_value, enum_pos) + len(enum_value)
          map_record = nl + nl.join([
              b'      #[cfg(feature = "map")]',
              b'      Value::Map(r) => &*(r as *const Ref<MechMap> as *const Ref<T>),',
              b'      #[cfg(feature = "record")]',
              b'      Value::Record(r) => &*(r as *const Ref<MechRecord> as *const Ref<T>),',
          ])
          data = data[:after_enum] + map_record + data[after_enum:]

          table_value = b'      Value::Table(r) => &*(r as *const Ref<MechTable> as *const Ref<T>),'
          after_table = data.index(table_value, after_enum) + len(table_value)
          tuple_arm = nl + nl.join([
              b'      #[cfg(feature = "tuple")]',
              b'      Value::Tuple(r) => &*(r as *const Ref<MechTuple> as *const Ref<T>),',
          ])
          data = data[:after_table] + tuple_arm + data[after_table:]
          write(file, data)

          # Register the nullary structural alias function and emit its stable ID.
          file, data = read('src/interpreter/src/stdlib/access/tuple.rs')
          compiler_marker = b'#[cfg(feature = "compiler")]'
          compiler_pos = data.index(compiler_marker)
          nl = newline_near(data, compiler_pos)
          factory = nl.join([
              b'impl MechFunctionFactory for TupleAccessElement {',
              b'  fn new(args: FunctionArgs) -> MResult<Box<dyn MechFunction>> {',
              b'    match args {',
              b'      FunctionArgs::Nullary(out) => Ok(Box::new(TupleAccessElement { out })),',
              b'      _ => Err(MechError::new(',
              b'        IncorrectNumberOfArguments { expected: 0, found: args.len() },',
              b'        None,',
              b'      ).with_compiler_loc()),',
              b'    }',
              b'  }',
              b'}',
              b'register_descriptor! {',
              b'  FunctionDescriptor {',
              b'    name: "TupleAccessElement",',
              b'    ptr: TupleAccessElement::new,',
              b'  }',
              b'}',
              b'',
          ])
          data = data[:compiler_pos] + factory + data[compiler_pos:]
          old_hash = b'hash_str(stringify!("TupleAccessElement"))'
          if data.count(old_hash) != 1:
              raise SystemExit(f'expected one quoted tuple access hash, found {data.count(old_hash)}')
          data = data.replace(old_hash, b'hash_str("TupleAccessElement")', 1)
          write(file, data)
          PY

      - name: Verify targeted regression
        run: |
          cargo test -p mech-interpreter --lib \
            expressions::structural_alias_access_tests::decoded_structural_alias_access_matches_source \
            -- --exact

      - name: Verify complete interpreter suite
        run: cargo test -p mech-interpreter --lib

      - name: Commit and push minimal source diff
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/core/src/program/compiler/constants.rs \
            src/core/src/program/program.rs \
            src/core/src/value.rs \
            src/interpreter/src/stdlib/access/tuple.rs
          git diff --cached --stat
          git commit -m 'repair tuple fix source line endings'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
