name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  cargo:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Build and test
        run: |
          cargo clean

          # Linked-stdlib CLI build for examples that import named modules.
          cargo build --bin mech --features linked_stdlib
          ./target/debug/mech test examples/working

          # Prelude-only no-default feature checks.
          cargo build --no-default-features
          cargo test interpret
          cargo test bytecode

          # Runtime package tests.
          cargo test -p mech-runtime --lib --tests

          # Dynamic module validation without linked-stdlib.
          cargo build -p mech-module-math --target-dir target/dynamic-modules
          mkdir -p target/mech-modules
          cp target/dynamic-modules/debug/libmech_module_math.so target/mech-modules/
          MECH_MODULE_PATH=target/mech-modules cargo test --test dynamic_modules --no-default-features --features "base dynamic-modules f64"
