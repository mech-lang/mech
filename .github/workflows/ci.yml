name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  cargo:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk report at start
        run: bash scripts/ci-disk-report.sh

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Initialize Cargo timing summary
        run: |
          {
            echo "## Cargo CI timings"
            echo
            echo "| Command | Duration | Status |"
            echo "| --- | ---: | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build linked CLI and test examples
        run: |
          bash scripts/ci-timed.sh \
            "cargo build --bin mech --features linked_stdlib" \
            cargo build --locked --bin mech --features linked_stdlib
          bash scripts/ci-timed.sh \
            "mech test examples/working" \
            ./target/debug/mech test examples/working

      - name: Check root feature boundaries
        run: |
          bash scripts/ci-timed.sh \
            "cargo check --no-default-features" \
            cargo check --locked --no-default-features
          bash scripts/ci-timed.sh \
            "cargo check --no-default-features --features build" \
            cargo check --locked --no-default-features --features build
          bash scripts/ci-timed.sh \
            "cargo check --no-default-features --features test" \
            cargo check --locked --no-default-features --features test
          bash scripts/ci-timed.sh \
            "cargo run --bin mech --no-default-features --features test -- test fizzbuzz" \
            cargo run --locked --bin mech --no-default-features --features test -- \
              test examples/working/fizzbuzz.mec

      - name: Check package feature boundaries
        run: |
          bash scripts/ci-timed.sh \
            "cargo check -p mech-core --no-default-features --features mika" \
            cargo check --locked -p mech-core --no-default-features --features mika
          bash scripts/ci-timed.sh \
            "cargo check -p mech-core --no-default-features --features mika,serde" \
            cargo check --locked -p mech-core --no-default-features --features "mika serde"
          bash scripts/ci-timed.sh \
            "cargo check -p mech-syntax --no-default-features --features mika" \
            cargo check --locked -p mech-syntax --no-default-features --features mika
          bash scripts/ci-timed.sh \
            "cargo check -p mech-interpreter --no-default-features --features program" \
            cargo check --locked -p mech-interpreter --no-default-features --features program
          bash scripts/ci-timed.sh \
            "cargo check -p mech-program --no-default-features --features program" \
            cargo check --locked -p mech-program --no-default-features --features program

      - name: Run root language tests
        run: |
          bash scripts/ci-timed.sh \
            "cargo test interpret" \
            cargo test --locked interpret
          bash scripts/ci-timed.sh \
            "cargo test bytecode" \
            cargo test --locked bytecode

      - name: Run whole-value assignment graph tests
        run: |
          bash scripts/ci-timed.sh \
            "mech-interpreter whole_variable_assignment_registers_state_node" \
            cargo test --locked -p mech-interpreter \
              whole_variable_assignment_registers_state_node
          bash scripts/ci-timed.sh \
            "mech-interpreter whole_add_assignment_registers_state_node" \
            cargo test --locked -p mech-interpreter \
              whole_add_assignment_registers_state_node
          bash scripts/ci-timed.sh \
            "mech-interpreter whole_add_assignment_alias_is_sampled_once" \
            cargo test --locked -p mech-interpreter \
              whole_add_assignment_alias_is_sampled_once
          bash scripts/ci-timed.sh \
            "mech-interpreter decoded_whole_variable_assignment_matches_source_graph" \
            cargo test --locked -p mech-interpreter \
              decoded_whole_variable_assignment_matches_source_graph
          bash scripts/ci-timed.sh \
            "mech-interpreter decoded_whole_add_assignment_matches_source_graph" \
            cargo test --locked -p mech-interpreter \
              decoded_whole_add_assignment_matches_source_graph
          bash scripts/ci-timed.sh \
            "mech-interpreter whole_matrix_assignment_uses_root_cells" \
            cargo test --locked -p mech-interpreter \
              whole_matrix_assignment_uses_root_cells

      - name: Run dirty scheduler and register commit tests
        run: |
          bash scripts/ci-timed.sh \
            "mech-core reactive_dirty_scheduler_" \
            cargo test --locked -p mech-core reactive_dirty_scheduler_
          bash scripts/ci-timed.sh \
            "mech-interpreter dirty_scheduler_updates_only_reachable_combinational_nodes" \
            cargo test --locked -p mech-interpreter \
              dirty_scheduler_updates_only_reachable_combinational_nodes
          bash scripts/ci-timed.sh \
            "mech-interpreter dirty_scheduler_stops_at_register_boundary" \
            cargo test --locked -p mech-interpreter \
              dirty_scheduler_stops_at_register_boundary
          bash scripts/ci-timed.sh \
            "mech-core reactive_register_commit_" \
            cargo test --locked -p mech-core reactive_register_commit_
          bash scripts/ci-timed.sh \
            "mech-interpreter register_commit_" \
            cargo test --locked -p mech-interpreter register_commit_

      - name: Run reactive turn tests
        run: |
          bash scripts/ci-timed.sh \
            "mech-core reactive_turn_" \
            cargo test --locked -p mech-core reactive_turn_
          bash scripts/ci-timed.sh \
            "mech-interpreter reactive_turn_" \
            cargo test --locked -p mech-interpreter reactive_turn_
          bash scripts/ci-timed.sh \
            "mech-interpreter decoded_reactive_turn_" \
            cargo test --locked -p mech-interpreter decoded_reactive_turn_

      - name: Run pointer-register identity tests
        run: |
          bash scripts/ci-timed.sh \
            "mech-core compile_context_initializes_pointer_register_once" \
            cargo test --locked -p mech-core \
              compile_context_initializes_pointer_register_once
          bash scripts/ci-timed.sh \
            "mech-core pointer_register_scalar_initializes_once" \
            cargo test --locked -p mech-core \
              pointer_register_scalar_initializes_once
          bash scripts/ci-timed.sh \
            "mech-interpreter pointer_register_matrix_initializes_once" \
            cargo test --locked -p mech-interpreter \
              pointer_register_matrix_initializes_once
          bash scripts/ci-timed.sh \
            "mech-interpreter horizontal_concatenate_four_args_reuses_repeated_matrix_register" \
            cargo test --locked -p mech-interpreter \
              horizontal_concatenate_four_args_reuses_repeated_matrix_register
          bash scripts/ci-timed.sh \
            "mech-interpreter horizontal_concatenate_n_args_reuses_repeated_matrix_register" \
            cargo test --locked -p mech-interpreter \
              horizontal_concatenate_n_args_reuses_repeated_matrix_register
          bash scripts/ci-timed.sh \
            "mech-interpreter horizontal_concatenate_rdn_reuses_repeated_matrix_register" \
            cargo test --locked -p mech-interpreter \
              horizontal_concatenate_rdn_reuses_repeated_matrix_register
          bash scripts/ci-timed.sh \
            "mech-interpreter vertical_concatenate_n_args_reuses_repeated_matrix_register" \
            cargo test --locked -p mech-interpreter \
              vertical_concatenate_n_args_reuses_repeated_matrix_register

      - name: Run runtime package tests
        run: |
          bash scripts/ci-timed.sh \
            "cargo test -p mech-runtime --lib --tests" \
            cargo test --locked -p mech-runtime --lib --tests

      - name: Run CLI host and context tests
        run: |
          bash scripts/ci-timed.sh \
            "mech-syntax context_parser" \
            cargo test --locked -p mech-syntax --test context_parser
          bash scripts/ci-timed.sh \
            "mech-host-cli provider" \
            cargo test --locked -p mech-host-cli --features provider --test provider
          bash scripts/ci-timed.sh \
            "mech_cli_host integration test" \
            cargo test --locked --features "run repl pretty_print" --test mech_cli_host
          bash scripts/ci-timed.sh \
            "cli::run::tests" \
            cargo test --locked --features "run repl pretty_print" cli::run::tests
          bash scripts/ci-timed.sh \
            "cargo check runtime and hosts" \
            cargo check --locked -p mech-runtime -p mech-host-browser -p mech-host-cli
          bash scripts/ci-timed.sh \
            "cargo check mech-host-cli --no-default-features" \
            cargo check --locked -p mech-host-cli --no-default-features

      - name: Disk report at end
        if: always()
        run: bash scripts/ci-disk-report.sh

  project-native:
    name: Project native
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk report at start
        run: bash scripts/ci-disk-report.sh

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Check generic project package paths
        run: bash scripts/check-analog-clock-web.sh

      - name: Run native project tests
        run: |
          cargo test \
            -p mech-host-time \
            --no-default-features \
            --features native
          cargo test \
            -p mech-host-timer \
            --no-default-features \
            --features native
          cargo test \
            -p mech-host-scene \
            --no-default-features \
            --features native
          cargo test \
            -p mech-wasm \
            --no-default-features \
            --features browser_project

      - name: Check CLI clock
        run: |
          cargo test \
            --features "run cli_host time_host_native timer_host_native console_host_native scene_host_native" \
            --test mech_cli_host

      - name: Smoke test native analog clock project
        run: |
          cargo build --bin mech
          set +e
          timeout --preserve-status --signal=INT 5s target/debug/mech run examples/analog-clock > /tmp/analog-clock.out
          status=$?
          set -e
          test "$status" -eq 0
          grep '^│' /tmp/analog-clock.out > /tmp/clock-values.out
          test "$(wc -l < /tmp/clock-values.out)" -ge 2
          test "$(sort -u /tmp/clock-values.out | wc -l)" -ge 2

      - name: Confirm browser examples are generic
        run: |
          test ! -e examples/common
          test ! -e examples/pkg
          test ! -e examples/analog-clock/clock.js
          test ! -e mech-app
          test ! -e include/blog.html
          ! rg -n \
            "WasmMech|CURRENT_MECH|attach_repl|legacy_browser_api|analog_clock_demo|WasmAnalogClock|clock\.js" \
            src include examples

      - name: Disk report at end
        if: always()
        run: bash scripts/ci-disk-report.sh

      - name: Disk report on failure
        if: failure()
        run: bash scripts/ci-disk-report.sh

  project-browser:
    name: Project browser
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/project-browser
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk report at start
        run: bash scripts/ci-disk-report.sh

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        env:
          WASM_PACK_VERSION: v0.13.1
        run: |
          curl -fsSL \
            "https://github.com/rustwasm/wasm-pack/releases/download/${WASM_PACK_VERSION}/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o /tmp/wasm-pack.tar.gz
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          sudo install "/tmp/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack" /usr/local/bin/wasm-pack
          wasm-pack --version

      - name: Show Chrome version
        run: google-chrome --version

      - name: Check browser project feature boundaries
        run: |
          cargo check \
            -p mech-wasm \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features browser_project_runner
          cargo check \
            -p mech-wasm \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features "browser_project_runner,browser_host_time,browser_host_console,browser_host_scene,statements_default,compare_default,logic_default,subscript_default,math_default,matrix_default,f64,bool,string,record,tuple,table,atom,enum,variables"

      - name: Build browser project package
        run: bash scripts/build-mech-browser.sh

      - name: Remove browser release intermediates
        run: rm -rf "$CARGO_TARGET_DIR/wasm32-unknown-unknown/release"

      - name: Run headless Chrome WASM tests
        run: |
          wasm-pack test \
            --headless \
            --chrome \
            src/wasm \
            --no-default-features \
            --features browser_project \
            -- \
            --nocapture

      - name: Remove generated browser package
        if: always()
        run: rm -rf src/wasm/pkg

      - name: Disk report at end
        if: always()
        run: bash scripts/ci-disk-report.sh

      - name: Disk report on failure
        if: failure()
        run: bash scripts/ci-disk-report.sh
  run-only:
    name: Run-only CLI
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Build run-only CLI
        run: cargo build --bin mech --no-default-features --features run

      - name: Build run-only CLI with pretty print
        run: cargo build --bin mech --no-default-features --features "run pretty_print"

  windows-cli:
    name: Windows CLI
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-03
        run: |
          rustup show
          rustup toolchain install nightly-2026-03-03 --profile minimal
          rustup default nightly-2026-03-03

      - name: Build default Windows CLI
        run: cargo build --bin mech

      - name: Build REPL-only Windows CLI
        run: cargo build --bin mech --no-default-features --features repl

      - name: Build REPL-plus-Mika Windows CLI
        run: cargo build --bin mech --no-default-features --features "repl mika"

  dynamic-modules:
    name: Dynamic modules
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run dynamic module smoke path
        run: bash scripts/test-dynamic-modules.sh
