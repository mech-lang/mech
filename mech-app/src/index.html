<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blueprint Workspace</title>
    <style>
      :root {
        --bg: #0b3558;
        --sheet: #0e4f81;
        --grid-minor: rgba(212, 238, 255, 0.09);
        --grid-major: rgba(212, 238, 255, 0.22);
        --ink: #e8f5ff;
        --ink-muted: rgba(232, 245, 255, 0.75);
        --border: rgba(220, 242, 255, 0.5);
        --panel-bg: rgba(3, 21, 36, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", "Inter", "Roboto", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #15639e, #072846 60%);
      }

      .blueprint-shell {
        height: 100%;
        padding: clamp(10px, 2vw, 20px);
      }

      .blueprint-sheet {
        position: relative;
        height: 100%;
        border: 1px solid var(--border);
        background: var(--sheet);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.07), 0 10px 40px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      .blueprint-sheet::before,
      .blueprint-sheet::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .blueprint-sheet::before {
        background-image:
          linear-gradient(var(--grid-minor) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      .blueprint-sheet::after {
        background-image:
          linear-gradient(var(--grid-major) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
        background-size: 120px 120px;
      }

      .drafting-area {
        position: absolute;
        top: 44px;
        left: 44px;
        right: 44px;
        bottom: 44px;
        border: 1px solid rgba(233, 247, 255, 0.45);
      }

      .axis-top,
      .axis-left {
        position: absolute;
        color: var(--ink-muted);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        z-index: 5;
      }

      .axis-top {
        top: 12px;
        left: 44px;
        right: 44px;
        display: flex;
        justify-content: space-between;
      }

      .axis-left {
        top: 44px;
        left: 12px;
        bottom: 44px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      #example-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .title-block {
        position: absolute;
        right: 56px;
        bottom: 56px;
        width: min(460px, 54vw);
        background: var(--panel-bg);
        border: 1px solid rgba(232, 246, 255, 0.62);
        backdrop-filter: blur(1px);
        z-index: 6;
      }

      .title-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
      }

      .cell {
        border-right: 1px solid rgba(232, 246, 255, 0.42);
        border-bottom: 1px solid rgba(232, 246, 255, 0.42);
        padding: 6px 10px;
        min-height: 38px;
      }

      .cell:nth-child(2n) {
        border-right: 0;
      }

      .title {
        grid-column: 1 / -1;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.07em;
      }

      .label {
        font-size: 0.63rem;
        color: rgba(232, 246, 255, 0.75);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .value {
        font-size: 0.8rem;
        letter-spacing: 0.05em;
      }

      @media (max-width: 800px) {
        .drafting-area {
          top: 40px;
          left: 36px;
          right: 12px;
          bottom: 12px;
        }

        .axis-top {
          left: 36px;
          right: 12px;
        }

        .axis-left {
          top: 40px;
          bottom: 12px;
          left: 8px;
        }

        .title-block {
          right: 20px;
          bottom: 20px;
          width: min(380px, 72vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="blueprint-shell">
      <section class="blueprint-sheet" aria-label="Blueprint drawing sheet">
        <div class="axis-top" id="axis-top" aria-hidden="true"></div>
        <div class="axis-left" id="axis-left" aria-hidden="true"></div>

        <div class="drafting-area" id="drafting-area">
          <canvas id="example-canvas"></canvas>
        </div>

        <aside class="title-block" aria-label="Schematic title and revision block">
          <div class="title-grid">
            <div class="cell title">
              <div class="label">Project</div>
              <div class="value">UNIVERSAL CONTROL SCHEMATIC</div>
            </div>
            <div class="cell">
              <div class="label">Drawing No.</div>
              <div class="value">BL-2026-0142</div>
            </div>
            <div class="cell">
              <div class="label">Revision</div>
              <div class="value">A3</div>
            </div>
            <div class="cell">
              <div class="label">Scale</div>
              <div class="value">1:20</div>
            </div>
            <div class="cell">
              <div class="label">Author</div>
              <div class="value">J. Carter</div>
            </div>
            <div class="cell">
              <div class="label">Approved By</div>
              <div class="value">R. Singh</div>
            </div>
            <div class="cell">
              <div class="label">Date</div>
              <div class="value">2026-04-03</div>
            </div>
            <div class="cell">
              <div class="label">Sheet</div>
              <div class="value">01 / 01</div>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const draftingArea = document.getElementById("drafting-area");
      const topAxis = document.getElementById("axis-top");
      const leftAxis = document.getElementById("axis-left");
      const canvas = document.getElementById("example-canvas");
      const ctx = canvas.getContext("2d");

      function makeTopAxis(count) {
        topAxis.innerHTML = "";
        for (let i = 0; i < count; i++) {
          const label = document.createElement("span");
          label.textContent = String.fromCharCode(65 + i);
          topAxis.appendChild(label);
        }
      }

      function makeLeftAxis(count) {
        leftAxis.innerHTML = "";
        for (let i = 1; i <= count; i++) {
          const label = document.createElement("span");
          label.textContent = String(i);
          leftAxis.appendChild(label);
        }
      }

      function drawExampleSchematic() {
        const dpr = window.devicePixelRatio || 1;
        const width = draftingArea.clientWidth;
        const height = draftingArea.clientHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, width, height);

        ctx.strokeStyle = "rgba(235, 248, 255, 0.92)";
        ctx.lineWidth = 2;

        const midY = Math.round(height * 0.48);

        // input line
        ctx.beginPath();
        ctx.moveTo(80, midY);
        ctx.lineTo(width * 0.3, midY);
        ctx.stroke();

        // process block
        const boxX = width * 0.3;
        const boxY = midY - 60;
        const boxW = width * 0.25;
        const boxH = 120;
        ctx.strokeRect(boxX, boxY, boxW, boxH);

        // output line
        ctx.beginPath();
        ctx.moveTo(boxX + boxW, midY);
        ctx.lineTo(width - 120, midY);
        ctx.stroke();

        // signal arrow
        ctx.beginPath();
        ctx.moveTo(width - 120, midY);
        ctx.lineTo(width - 140, midY - 10);
        ctx.lineTo(width - 140, midY + 10);
        ctx.closePath();
        ctx.fillStyle = "rgba(235, 248, 255, 0.95)";
        ctx.fill();

        // annotations
        ctx.font = "600 13px Segoe UI";
        ctx.fillStyle = "rgba(235, 248, 255, 0.9)";
        ctx.fillText("INPUT", 85, midY - 12);
        ctx.fillText("CONTROL LOGIC", boxX + 20, boxY + boxH / 2 + 5);
        ctx.fillText("OUTPUT", width - 175, midY - 12);

        // center mark circle
        ctx.beginPath();
        ctx.arc(width * 0.18, midY, 18, 0, Math.PI * 2);
        ctx.stroke();
      }

      function layoutBlueprint() {
        const topLabels = Math.max(6, Math.min(18, Math.floor(draftingArea.clientWidth / 90)));
        const leftLabels = Math.max(5, Math.min(14, Math.floor(draftingArea.clientHeight / 70)));

        makeTopAxis(topLabels);
        makeLeftAxis(leftLabels);
        drawExampleSchematic();
      }

      window.addEventListener("resize", layoutBlueprint);
      layoutBlueprint();
    </script>
  </body>
</html>
