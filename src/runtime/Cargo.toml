[[example]]
name = "host_value_roundtrip"
path = "examples/host_value_roundtrip.rs"
required-features = ["program"]

[[example]]
name = "matrix_multiply"
path = "examples/matrix_multiply.rs"
required-features = ["program"]

[[example]]
name = "runtime_dep_src"
path = "examples/runtime_dep_src.rs"
